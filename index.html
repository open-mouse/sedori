<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>せどりバーコードスキャナー（Quagga2版）</title>
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.2/dist/quagga.min.js"></script>
<style>
  :root{
    --bg:#f4f6f8; --card:#fff; --border:#dde2e8; --accent:#2563eb;
    --good:#e6f7ed; --good-border:#22c55e; --danger:#ef4444;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,"Segoe UI","Hiragino Sans",sans-serif;
    background:var(--bg); color:#1f2937; padding:8px; padding-bottom:80px;
  }
  h1{font-size:18px; margin:8px 4px;}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:12px; margin-bottom:10px;
  }
  .card h2{font-size:14px; margin:0 0 8px; color:#374151;}

  #scanner-container{
    position:relative; width:100%; max-height:320px; overflow:hidden;
    border-radius:8px; background:#000;
  }
  #scanner-container video, #scanner-container canvas{
    width:100% !important; height:auto !important; display:block;
  }
  #overlay-canvas{
    position:absolute; top:0; left:0; width:100% !important; height:100% !important;
  }

  .scanbar{display:flex; gap:8px; margin-top:8px; align-items:center; flex-wrap:wrap;}
  button{border:none; border-radius:8px; padding:10px 14px; font-size:14px; cursor:pointer; font-weight:600;}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-secondary{background:#e5e7eb; color:#111;}
  .btn-danger{background:var(--danger); color:#fff;}
  #lastScan{font-size:13px; color:#555; margin-top:6px; word-break:break-all;}
  #warnBox{display:none; background:#fff3cd; border:1px solid #ffe58f; color:#7a5b00; padding:8px; border-radius:8px; font-size:12px; margin-bottom:8px;}

  .settings-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .settings-grid label{display:block; font-size:12px; color:#555; margin-bottom:2px;}
  .settings-grid input{width:100%; padding:8px; border:1px solid var(--border); border-radius:6px; font-size:14px;}

  table{width:100%; border-collapse:collapse; font-size:12px;}
  th,td{border-bottom:1px solid var(--border); padding:6px 4px; text-align:left; white-space:nowrap;}
  th{background:#f0f2f5; position:sticky; top:0;}
  .tablewrap{overflow-x:auto;}
  input.cell{width:70px; padding:4px; border:1px solid var(--border); border-radius:4px; font-size:12px;}
  input.cell-name{width:140px;}
  tr.good{background:var(--good);}
  tr.good td{border-bottom-color:var(--good-border);}
  .profit-pos{color:#16a34a; font-weight:700;}
  .profit-neg{color:var(--danger); font-weight:700;}
  .links a{display:inline-block; margin:0 3px 3px 0; padding:3px 6px; border-radius:5px; font-size:11px; text-decoration:none; color:#fff;}
  .l-amazon{background:#ff9900;}
  .l-rakuten{background:#bf0000;}
  .l-mercari{background:#ff5050;}
  .l-yahoo{background:#7300de;}
  .del-btn{background:var(--danger); color:#fff; border:none; border-radius:5px; padding:4px 8px; font-size:11px;}
  .footer-actions{
    position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--border);
    padding:8px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap; z-index:10;
  }
  .count-badge{display:inline-block; background:var(--accent); color:#fff; border-radius:10px; padding:1px 8px; font-size:12px; margin-left:6px;}
  .empty-msg{color:#999; font-size:13px; padding:12px; text-align:center;}
  .time-cell{font-size:10px; color:#888;}
</style>
</head>
<body>

<h1>📦 せどりバーコードスキャナー</h1>

<div id="warnBox"></div>

<div class="card">
  <h2>カメラスキャン</h2>
  <div id="scanner-container">
    <canvas id="overlay-canvas"></canvas>
  </div>
  <div class="scanbar">
    <button id="startBtn" class="btn-primary">スキャン開始</button>
    <button id="stopBtn" class="btn-secondary">停止</button>
  </div>
  <div id="lastScan">最後の読み取り: -</div>
</div>

<div class="card">
  <h2>設定（グローバル）</h2>
  <div class="settings-grid">
    <div>
      <label>デフォルト仕入れ値（円）</label>
      <input type="number" id="defCost" value="0">
    </div>
    <div>
      <label>送料・手数料（円）</label>
      <input type="number" id="defFee" value="0">
    </div>
    <div>
      <label>目標利益率（%）</label>
      <input type="number" id="targetRate" value="20">
    </div>
    <div style="display:flex;align-items:end;">
      <button id="applyDefaultsBtn" class="btn-secondary" style="margin-top:18px;">未入力行に適用</button>
    </div>
  </div>
</div>

<div class="card">
  <h2>スキャン済み商品リスト <span class="count-badge" id="countBadge">0</span></h2>
  <div class="tablewrap">
    <table id="itemTable">
      <thead>
        <tr>
          <th>バーコード</th>
          <th>スキャン時刻</th>
          <th>商品名</th>
          <th>仕入れ値</th>
          <th>送料手数料</th>
          <th>売値</th>
          <th>利益額</th>
          <th>利益率</th>
          <th>検索</th>
          <th>削除</th>
        </tr>
      </thead>
      <tbody id="itemBody"></tbody>
    </table>
    <div class="empty-msg" id="emptyMsg">まだスキャンした商品がありません。「スキャン開始」を押してバーコードをカメラにかざしてください。</div>
  </div>
</div>

<div class="footer-actions">
  <button id="exportAllBtn" class="btn-primary">CSV出力（全件）</button>
  <button id="exportGoodBtn" class="btn-secondary">CSV出力（条件クリアのみ）</button>
  <button id="clearAllBtn" class="btn-danger">全件削除</button>
</div>

<script>
'use strict';

/* ---------- iframe内での起動を禁止 ----------
   getUserMedia はトップレベルのブラウジングコンテキストでのみ
   安定して動作させたいため、iframe埋め込みでの実行を明示的に拒否する。 */
if (window.self !== window.top) {
  document.body.innerHTML =
    '<div style="padding:40px;text-align:center;font-family:sans-serif;">' +
    '<h2>⚠️ このページはiframe内では動作しません</h2>' +
    '<p>カメラ権限の都合上、ブラウザで直接このURLを開いてください。</p></div>';
  throw new Error('iframe内での実行を検出したため停止しました');
}

const warnBox = document.getElementById('warnBox');
function showWarn(msg) {
  warnBox.style.display = 'block';
  warnBox.textContent = msg;
}

// HTTPS（またはlocalhost）以外では getUserMedia が使えないため事前に警告
const isSecure = location.protocol === 'https:' ||
  location.hostname === 'localhost' ||
  location.hostname === '127.0.0.1';
if (!isSecure) {
  showWarn('⚠️ このページはHTTPS環境（またはlocalhost）で開く必要があります。カメラが起動しません。');
}
if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
  showWarn('⚠️ このブラウザは getUserMedia に対応していません。');
}

let scanning = false;
let lastSeenCode = null;
let lastSeenTime = 0;
const items = []; // {barcode, time, name, cost, fee, price}

function startScan() {
  if (scanning) return;

  Quagga.init({
    inputStream: {
      name: 'Live',
      type: 'LiveStream',
      target: document.querySelector('#scanner-container'),
      constraints: {
        facingMode: 'environment',
        width: { min: 640 },
        height: { min: 480 }
      },
      area: { top: '0%', right: '0%', left: '0%', bottom: '0%' }
    },
    locator: { patchSize: 'medium', halfSample: true },
    numOfWorkers: navigator.hardwareConcurrency || 2,
    frequency: 10,
    decoder: {
      readers: [
        'ean_reader',
        'ean_8_reader',
        'code_128_reader',
        'upc_reader',
        'upc_e_reader'
      ]
    },
    locate: true
  }, function (err) {
    if (err) {
      console.error(err);
      showWarn('カメラの起動に失敗しました: ' + err.message + ' （Chromeのカメラ権限設定を確認してください）');
      return;
    }
    Quagga.start();
    scanning = true;
  });

  Quagga.onProcessed(drawOverlay);
  Quagga.onDetected(handleDetected);
}

function stopScan() {
  if (!scanning) return;
  Quagga.offDetected(handleDetected);
  Quagga.offProcessed(drawOverlay);
  Quagga.stop();
  scanning = false;
}

function drawOverlay(result) {
  const canvas = document.getElementById('overlay-canvas');
  const liveCanvas = Quagga.canvas && Quagga.canvas.dom && Quagga.canvas.dom.image;
  if (liveCanvas) {
    canvas.width = liveCanvas.width;
    canvas.height = liveCanvas.height;
  }
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!result) return;

  if (result.boxes) {
    result.boxes
      .filter(box => box !== result.box)
      .forEach(box => {
        ctx.strokeStyle = 'orange';
        ctx.lineWidth = 2;
        ctx.beginPath();
        box.forEach((p, i) => i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]));
        ctx.closePath();
        ctx.stroke();
      });
  }
  if (result.box) {
    ctx.strokeStyle = '#00e676';
    ctx.lineWidth = 3;
    ctx.beginPath();
    result.box.forEach((p, i) => i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]));
    ctx.closePath();
    ctx.stroke();
  }
  if (result.codeResult && result.codeResult.code) {
    ctx.strokeStyle = 'red';
    ctx.lineWidth = 3;
    const line = result.line;
    if (line) {
      ctx.beginPath();
      ctx.moveTo(line[0].x, line[0].y);
      ctx.lineTo(line[1].x, line[1].y);
      ctx.stroke();
    }
  }
}

function handleDetected(result) {
  const code = result.codeResult.code;
  const now = Date.now();
  // 同じコードの連続誤検知防止（1.5秒以内の同一コードは無視）
  if (code === lastSeenCode && now - lastSeenTime < 1500) return;
  lastSeenCode = code;
  lastSeenTime = now;

  const timeStr = new Date().toLocaleTimeString();
  document.getElementById('lastScan').textContent = '最後の読み取り: ' + code + '  (' + timeStr + ')';

  if (items.some(it => it.barcode === code)) {
    return; // 重複防止
  }
  const cost = Number(document.getElementById('defCost').value) || 0;
  const fee = Number(document.getElementById('defFee').value) || 0;
  items.push({ barcode: code, time: timeStr, name: '', cost: cost, fee: fee, price: 0 });
  renderTable();
  if (navigator.vibrate) navigator.vibrate(100);
}

function calcProfit(item) {
  const profit = item.price - item.cost - item.fee;
  const rate = item.price > 0 ? (profit / item.price) * 100 : 0;
  return { profit, rate };
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderTable() {
  const body = document.getElementById('itemBody');
  const emptyMsg = document.getElementById('emptyMsg');
  body.innerHTML = '';
  document.getElementById('countBadge').textContent = items.length;

  if (items.length === 0) {
    emptyMsg.style.display = 'block';
    return;
  }
  emptyMsg.style.display = 'none';

  const targetRate = Number(document.getElementById('targetRate').value) || 0;

  items.forEach((item, idx) => {
    const { profit, rate } = calcProfit(item);
    const tr = document.createElement('tr');
    if (item.price > 0 && rate >= targetRate) tr.classList.add('good');

    const q = encodeURIComponent(item.name || item.barcode);
    const links = `
      <span class="links">
        <a class="l-amazon" target="_blank" rel="noopener" href="https://www.amazon.co.jp/s?k=${q}">Amazon</a>
        <a class="l-rakuten" target="_blank" rel="noopener" href="https://search.rakuten.co.jp/search/mall/${q}/">楽天</a>
        <a class="l-mercari" target="_blank" rel="noopener" href="https://jp.mercari.com/search?keyword=${q}">メルカリ</a>
        <a class="l-yahoo" target="_blank" rel="noopener" href="https://shopping.yahoo.co.jp/search?p=${q}">Yahoo</a>
      </span>`;

    tr.innerHTML = `
      <td>${item.barcode}</td>
      <td class="time-cell">${item.time}</td>
      <td><input class="cell cell-name" data-field="name" value="${escapeHtml(item.name)}" placeholder="商品名"></td>
      <td><input class="cell" type="number" data-field="cost" value="${item.cost}"></td>
      <td><input class="cell" type="number" data-field="fee" value="${item.fee}"></td>
      <td><input class="cell" type="number" data-field="price" value="${item.price}"></td>
      <td class="${profit > 0 ? 'profit-pos' : (profit < 0 ? 'profit-neg' : '')}">${profit.toFixed(0)}</td>
      <td class="${profit > 0 ? 'profit-pos' : (profit < 0 ? 'profit-neg' : '')}">${item.price > 0 ? rate.toFixed(1) + '%' : '-'}</td>
      <td>${links}</td>
      <td><button class="del-btn" data-idx="${idx}">削除</button></td>
    `;
    body.appendChild(tr);
  });

  body.querySelectorAll('input.cell').forEach(input => {
    input.addEventListener('input', (e) => {
      const tr = e.target.closest('tr');
      const idx = Array.from(body.children).indexOf(tr);
      const field = e.target.dataset.field;
      const val = field === 'name' ? e.target.value : Number(e.target.value) || 0;
      items[idx][field] = val;
      renderTable();
      restoreFocus(idx, field);
    });
  });

  body.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const idx = Number(e.target.dataset.idx);
      items.splice(idx, 1);
      renderTable();
    });
  });
}

function restoreFocus(idx, field) {
  requestAnimationFrame(() => {
    const body = document.getElementById('itemBody');
    const tr = body.children[idx];
    if (!tr) return;
    const input = tr.querySelector(`input[data-field="${field}"]`);
    if (input) {
      input.focus();
      const len = input.value.length;
      input.setSelectionRange(len, len);
    }
  });
}

document.getElementById('applyDefaultsBtn').addEventListener('click', () => {
  const cost = Number(document.getElementById('defCost').value) || 0;
  const fee = Number(document.getElementById('defFee').value) || 0;
  items.forEach(it => {
    if (!it.cost) it.cost = cost;
    if (!it.fee) it.fee = fee;
  });
  renderTable();
});

document.getElementById('targetRate').addEventListener('input', renderTable);

document.getElementById('clearAllBtn').addEventListener('click', () => {
  if (items.length === 0) return;
  if (confirm('全件削除しますか？')) {
    items.length = 0;
    renderTable();
  }
});

function toCsv(rows) {
  const header = ['バーコード', 'スキャン時刻', '商品名', '仕入れ値', '送料手数料', '売値', '利益額', '利益率(%)'];
  const lines = [header.join(',')];
  rows.forEach(it => {
    const { profit, rate } = calcProfit(it);
    const row = [
      it.barcode,
      it.time,
      `"${(it.name || '').replace(/"/g, '""')}"`,
      it.cost,
      it.fee,
      it.price,
      profit.toFixed(0),
      it.price > 0 ? rate.toFixed(1) : ''
    ];
    lines.push(row.join(','));
  });
  return '﻿' + lines.join('\r\n');
}

function downloadCsv(content, filename) {
  const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.getElementById('exportAllBtn').addEventListener('click', () => {
  if (items.length === 0) { alert('出力する商品がありません'); return; }
  downloadCsv(toCsv(items), `sedori_all_${Date.now()}.csv`);
});

document.getElementById('exportGoodBtn').addEventListener('click', () => {
  const targetRate = Number(document.getElementById('targetRate').value) || 0;
  const good = items.filter(it => {
    const { rate } = calcProfit(it);
    return it.price > 0 && rate >= targetRate;
  });
  if (good.length === 0) { alert('条件をクリアした商品がありません'); return; }
  downloadCsv(toCsv(good), `sedori_good_${Date.now()}.csv`);
});

document.getElementById('startBtn').addEventListener('click', startScan);
document.getElementById('stopBtn').addEventListener('click', stopScan);

window.addEventListener('load', renderTable);
</script>
</body>
</html>
